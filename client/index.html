<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yachal House</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4c1d95" />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="build-version" content="2026-04-07-auth-fix-1" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Yachal House" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/yahal.png" />

    <!-- SEO -->
    <meta name="description" content="Yachal House Church Workers Portal - Ridge, Accra" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
  const theme = localStorage.getItem("yahal_theme");
  if (theme === "dark") document.body.classList.add("dark");

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", async () => {
      try {
        const registration = await navigator.serviceWorker.register("/sw.js");
        console.log("SW registered:", registration.scope);
      } catch (error) {
        console.error("SW registration failed:", error);
      }
    });
  }
</script>
  </body>
</html>
